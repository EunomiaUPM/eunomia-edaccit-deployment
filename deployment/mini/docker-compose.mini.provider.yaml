name: edaccit-provider

services:
  provider-db:
    container_name: edaccit-provider-db
    image: "postgres"
    restart: always
    env_file:
      - ./../../static/envs/provider/db.env.example
    ports:
      - "1400:5432"

  provider-redis:
    image: redis:alpine
    restart: always
    container_name: edaccit-provider-redis
    ports:
      - "6379:6379"
    command: >
      redis-server  --requirepass ds_core_provider_redis --user admin on
      >ds_core_provider_redis ~* +@all

  # =========================
  # Setup job (one-shot)
  # =========================
  provider-setup:
    container_name: edaccit-provider-setup
    image: quay.io/eunomia_upm/ds-agent:dev
    platform: linux/amd64
    command: ["setup", "-e", "/app/static/config/mini.provider.yaml"]
    volumes:
      - ./../../static/config/provider/mini:/app/static/config
      - ./../../static/specs/agent:/app/static/specs
      - ./../../static/policy_templates:/app/static/policy_templates
      - ./../../vault/provider:/app/vault
    depends_on:
      - provider-db
      - provider-redis
    env_file:
      - ./../../static/envs/provider/core.env.example
    restart: "no"

  # =========================
  # Main service
  # =========================
  provider:
    container_name: edaccit-provider
    image: quay.io/eunomia_upm/ds-agent:dev
    platform: linux/amd64
    command: ["start", "-e", "/app/static/config/mini.provider.yaml"]
    ports:
      - "1200:1200"
    volumes:
      - ./../../static/config/provider/mini:/app/static/config
      - ./../../static/specs/agent:/app/static/specs
      - ./../../static/policy_templates:/app/static/policy_templates
      - ./../../vault/provider:/app/vault
    depends_on:
      provider-setup:
        condition: service_completed_successfully
      provider-db:
        condition: service_started
      provider-redis:
        condition: service_started
    env_file:
      - ./../../static/envs/provider/core.env.example
    extra_hosts:
      - "host.docker.internal:host-gateway"

