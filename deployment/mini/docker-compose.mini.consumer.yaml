name: ecostars-consumer

services:
  consumer-db:
    container_name: ecostars-consumer-db
    image: "postgres"
    restart: always
    env_file:
      - ./../../static/envs/consumer/db.env.example
    ports:
      - "1300:5432"

  consumer-redis:
    image: redis:alpine
    restart: always
    container_name: ecostars-consumer-redis
    ports:
      - "6380:6379"
    command: >
      redis-server  --requirepass ds_core_consumer_redis --user admin on
      >ds_core_consumer_redis ~* +@all

  # =========================
  # Setup job (one-shot)
  # =========================
  consumer-setup:
    container_name: ecostars-consumer-setup
    image: quay.io/eunomia_upm/ds-agent-core:0.3.9
    command: [ "setup", "-e", "/app/static/config/mini.consumer.yaml" ]
    volumes:
      - ./../../static/config/consumer/mini:/app/static/config
      - ./../../static/specs/agent:/app/static/specs
      - ./../../static/policy_templates:/app/static/policy_templates
      - ./../../vault/consumer:/app/vault
    depends_on:
      - consumer-db
      - consumer-redis
    env_file:
      - ./../../static/envs/consumer/core.env.example
    restart: "no"

  # =========================
  # Main service
  # =========================
  consumer:
    container_name: ecostars-consumer
    image: quay.io/eunomia_upm/ds-agent-core:0.3.9
    command: [ "start", "-e", "/app/static/config/mini.consumer.yaml" ]
    ports:
      - "1100:1100"
    volumes:
      - ./../../static/config/consumer/mini:/app/static/config
      - ./../../static/specs/agent:/app/static/specs
      - ./../../static/policy_templates:/app/static/policy_templates
      - ./../../vault/consumer:/app/vault
    depends_on:
      consumer-setup:
        condition: service_completed_successfully
      consumer-db:
        condition: service_started
      consumer-redis:
        condition: service_started
    env_file:
      - ./../../static/envs/consumer/core.env.example
    extra_hosts:
      - "host.docker.internal:host-gateway"
